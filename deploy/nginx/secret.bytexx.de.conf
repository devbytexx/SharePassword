server {
    listen 443 ssl http2;
    server_name secret.bytexx.de;

    ssl_certificate     /etc/letsencrypt/live/secret.bytexx.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/secret.bytexx.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer" always;
    # Wenn Cloudflare Turnstile aktiviert ist, müssen challenges.cloudflare.com Quellen erlaubt sein.
    # Andernfalls die Turnstile-Einträge in script-src, frame-src und connect-src entfernen.
    # blob: in img-src/frame-src nötig für die clientseitige Datei-Vorschau
    # (Bilder via <img src="blob:">, PDFs via <iframe src="blob:">). Der ZIP-Download
    # braucht dank fflate zipSync (synchron, kein Worker) keine CSP-Lockerung.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 25 MB Dateien → ~45 MB Request-Body (doppeltes Base64). Muss zu
    # maxBodyBytes in lib/config.js passen.
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 80;
    server_name secret.bytexx.de;
    return 301 https://$host$request_uri;
}
