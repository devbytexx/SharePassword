<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SharePassword – BYTEXX</title>
  <script src="/js/theme-init.js"></script>
  <link rel="stylesheet" href="/css/style.css?v=20260604-2">
  <link rel="icon" type="image/png" href="/img/bytexx-logo.png">
</head>
<body>
  <canvas id="hex-canvas" aria-hidden="true"></canvas>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="brand">
        <img src="/img/bytexx-logo.png" alt="BYTEXX" class="brand__logo">
        <span class="brand__title">SharePassword</span>
      </a>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Theme wechseln"></button>
        <button id="lang-toggle" class="lang-toggle" data-i18n="footer.lang">EN</button>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1 data-i18n="create.title">Geheimnis sicher teilen</h1>
      <p class="lead" data-i18n="create.lead"></p>
    </section>

    <!-- ===== Create form ===== -->
    <section id="form-section" class="card">
      <form id="create-form" novalidate>
        <label class="field">
          <span data-i18n="create.textareaLabel">Inhalt</span>
          <textarea id="plaintext" rows="6" required
                    data-i18n-placeholder="create.placeholder"></textarea>
        </label>

        <div class="field">
          <span data-i18n="create.fileLabel">Dateien (optional, max. 25 MB gesamt)</span>
          <label id="dropzone" class="dropzone" for="file">
            <input type="file" id="file" multiple class="dropzone__input">
            <div class="dropzone__inner">
              <svg class="dropzone__icon" viewBox="0 0 24 24" width="28" height="28"
                   fill="none" stroke="currentColor" stroke-width="1.8"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span class="dropzone__text" data-i18n="create.dropzoneText">
                Dateien hierher ziehen oder klicken
              </span>
              <span class="dropzone__hint" data-i18n="create.dropzoneHint">
                max. 25 MB gesamt · bleiben verschlüsselt im Browser
              </span>
            </div>
            <ul id="dropzone-files" class="dropzone__files" hidden></ul>
          </label>
        </div>


        <label class="field">
          <span data-i18n="create.expiresLabel">Ablauf</span>
          <select id="expires">
            <option value="3600"    data-i18n="create.expires.1h">1 Stunde</option>
            <option value="10800"   data-i18n="create.expires.3h">3 Stunden</option>
            <option value="43200"   data-i18n="create.expires.12h">12 Stunden</option>
            <option value="86400"   data-i18n="create.expires.1d">1 Tag</option>
            <option value="604800"  data-i18n="create.expires.7d" selected>7 Tage</option>
            <option value="1209600" data-i18n="create.expires.14d">14 Tage</option>
          </select>
        </label>

        <label class="field checkbox">
          <input type="checkbox" id="burn" checked>
          <span data-i18n="create.burnLabel">Nach erstem Abruf löschen</span>
        </label>

        <details class="advanced">
          <summary data-i18n="create.advancedToggle">Erweiterte Optionen</summary>
          <p class="advanced__lead" data-i18n="create.advancedLead"></p>
          <div class="field-row">
            <label class="field">
              <span data-i18n="create.senderNameLabel">Ihr Name (optional)</span>
              <input type="text" id="sender-name" maxlength="80" autocomplete="name">
              <small class="field__help" data-i18n="create.senderNameHelp"></small>
            </label>
            <label class="field">
              <span data-i18n="create.recipientNameLabel">Empfänger Name (optional)</span>
              <input type="text" id="recipient-name" maxlength="80" autocomplete="off">
              <small class="field__help" data-i18n="create.recipientNameHelp"></small>
            </label>
          </div>
          <label class="field">
            <div class="field__head">
              <span data-i18n="create.passphraseLabel">Passphrase (optional)</span>
              <button type="button" id="pass-show" class="link-mini" data-i18n="create.passphraseShow">Anzeigen</button>
            </div>
            <input type="password" id="passphrase" autocomplete="new-password">
            <div class="pass-suggest">
              <span class="pass-suggest__label" data-i18n="create.passphraseSuggestLabel">Vorschlag:</span>
              <code id="pass-suggest-text" class="pass-suggest__code"></code>
              <button type="button" id="pass-apply" class="btn-mini" data-i18n="create.passphraseApply">Übernehmen</button>
              <button type="button" id="pass-regen" class="btn-mini" data-i18n="create.passphraseRegen">Neu</button>
            </div>
            <small class="field__help" data-i18n="create.passphraseHelp"></small>
          </label>
          <label class="field">
            <span data-i18n="create.notifyLabel">Benachrichtigungs-E-Mail (optional)</span>
            <input type="email" id="notify-email">
            <small class="field__help" data-i18n="create.notifyHelp"></small>
          </label>
          <label class="field">
            <span data-i18n="create.hintLabel">Hinweis für den Empfänger (sichtbar vor Entschlüsselung)</span>
            <textarea id="sender-hint" maxlength="120" rows="3" class="hint-textarea"></textarea>
            <small class="field__help" data-i18n="create.hintHelp"></small>
          </label>
        </details>

        <!-- Cloudflare Turnstile — wird nur eingeblendet, wenn Site-Key in .env gesetzt -->
        <div id="turnstile-slot" class="turnstile-slot" hidden></div>

        <!-- Honeypot — versteckt für Menschen, magnetisch für Bots.
             name/id bewusst neutral ("website") + komplette Anti-Autofill-
             Marker (LastPass, 1Password, Bitwarden), damit Passwort-
             Manager das Feld nicht eigenmächtig befüllen. -->
        <div class="hp" aria-hidden="true">
          <label>
            Webseite (bitte leer lassen):
            <input type="text"
                   id="website"
                   name="website"
                   value=""
                   tabindex="-1"
                   autocomplete="off"
                   data-lpignore="true"
                   data-1p-ignore
                   data-bwignore>
          </label>
        </div>

        <!-- Upload-Fortschritt — beim Absenden eingeblendet -->
        <div id="upload-progress" class="upload-progress" hidden aria-live="polite">
          <div class="upload-progress__bar">
            <div id="upload-progress-fill" class="upload-progress__fill"></div>
          </div>
          <p id="upload-progress-phase" class="upload-progress__phase"></p>
          <p class="upload-progress__hint" data-i18n="create.uploadWaitHint"></p>
        </div>

        <button type="submit" class="btn btn--primary" data-i18n="create.submit">Link erzeugen</button>
      </form>
    </section>

    <!-- ===== Result section ===== -->
    <section id="result-section" class="card" hidden>
      <h2 class="result__title" data-i18n="create.resultTitle">Fertig</h2>
      <p class="result__lead" data-i18n="create.resultLead"></p>

      <div class="result__url-box">
        <input id="result-url" type="text" readonly aria-label="Link">
        <button id="copy-btn" type="button" class="btn btn--secondary" data-i18n="create.copy">Kopieren</button>
      </div>

      <div class="result__actions">
        <a id="mail-btn" href="#" class="btn btn--ghost" data-i18n="create.mail">Per E-Mail teilen</a>
        <button id="new-btn" type="button" class="btn btn--ghost" data-i18n="create.new">Neues Geheimnis</button>
      </div>

      <p class="result__meta">
        <span data-i18n="create.expiresAt">Gültig bis</span>: <strong id="result-expires"></strong>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <span class="footer-security-wrap">
      <a href="/sicherheit.html" class="footer-security-link" data-i18n="footer.security">Sicherheit</a>
      <!-- Sprechblase sitzt direkt über dem "Sicherheit"-Link, Pfeil zeigt drauf -->
      <span id="security-hint" class="security-hint" role="note">
        <span class="security-hint__icon" aria-hidden="true">🔒</span>
        <span class="security-hint__text" data-i18n="securityHint.text">Wie sicher ist das?</span>
      </span>
    </span>
    <a href="/impressum.html" data-i18n="footer.impressum">Impressum</a>
    <a href="/datenschutz.html" data-i18n="footer.datenschutz">Datenschutz</a>
    <a href="https://github.com/devbytexx/SharePassword" target="_blank" rel="noopener" data-i18n="footer.github">Quellcode</a>
    <span class="brand__title">© BYTEXX IT</span>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="/js/create.js?v=20260604-3"></script>
  <script type="module" src="/js/hexagon.js?v=20260604-3"></script>
</body>
</html>
